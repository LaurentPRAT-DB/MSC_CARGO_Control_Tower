command:
  - streamlit
  - run
  - app.py
  - --server.port=8000
  - --server.address=0.0.0.0

env:
  - name: GENIE_SPACE_ID
    value: "01f14d4f205e1e8dac116814dbf0264f"
  - name: WAREHOUSE_ID
    value: "b868e84cedeb4262"
  - name: CATALOG
    value: "serverless_stable_3n0ihb_catalog"
  - name: SCHEMA
    value: "msc_air_cargo"
  - name: LLM_ENDPOINT
    value: "databricks-claude-sonnet-4"

resources:
  - name: sql-warehouse
    sql_warehouse:
      id: b868e84cedeb4262
      permission: CAN_USE
  - name: serving-endpoint
    serving_endpoint:
      name: databricks-claude-sonnet-4
      permission: CAN_QUERY
