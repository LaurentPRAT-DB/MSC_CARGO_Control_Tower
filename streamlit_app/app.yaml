command:
  - streamlit
  - run
  - app.py
  - --server.port=8000
  - --server.address=0.0.0.0

env:
  - name: GENIE_SPACE_ID
    value: "01f14d4a2d0513e59c33cccb72a97a47"
  - name: WAREHOUSE_ID
    value: "e9b34f7a2e4b0561"
  - name: CATALOG
    value: "laurent_prat_entity_matching_dev"
  - name: SCHEMA
    value: "msc_air_cargo"
  - name: LLM_ENDPOINT
    value: "databricks-claude-sonnet-4"

resources:
  - name: sql-warehouse
    sql_warehouse:
      id: e9b34f7a2e4b0561
      permission: CAN_USE
  - name: serving-endpoint
    serving_endpoint:
      name: databricks-claude-sonnet-4
      permission: CAN_QUERY
